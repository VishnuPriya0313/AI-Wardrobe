spring.application.name=ai-wardrobe-studio
server.port=${PORT:8080}
spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB
ai.provider=${AI_PROVIDER:ollama}
ai.openai.model=${OPENAI_MODEL:gpt-4.1-mini}
ai.ollama.base-url=${OLLAMA_BASE_URL:http://127.0.0.1:11434}
ai.ollama.model=${OLLAMA_MODEL:llava}
ai.ollama.match-model=${OLLAMA_MATCH_MODEL:llama3.2:3b}
fashion.trend-context=${FASHION_TREND_CONTEXT:}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://127.0.0.1:5173,http://localhost:5173,http://*:*}
app.s3.enabled=${APP_S3_ENABLED:false}
app.s3.bucket=${APP_S3_BUCKET:}
app.s3.region=${APP_S3_REGION:us-east-1}
app.s3.key-prefix=${APP_S3_KEY_PREFIX:wardrobe-uploads}
app.s3.public-base-url=${APP_S3_PUBLIC_BASE_URL:}
app.s3.endpoint=${APP_S3_ENDPOINT:}
